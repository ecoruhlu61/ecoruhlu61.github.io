<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blok Düşürme - Tek Kişilik Oyna</title>
<meta name="description" content="Klasik blok düşürme oyununu oyna! Satırları doldur, puanları topla, seviye seviye hızlan.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;--bg2:#111827;--bg3:#1c2536;--surf:#1e2d40;
  --bdr:#2a3f58;--bdr2:#3a5472;
  --txt:#e8f0fe;--txt2:#8aa5c2;--txt3:#556a82;
  --blue:#3b82f6;--bl:#60a5fa;--bd:#1e3a5f;
  --red:#ef4444;--rd:#3f1515;
  --amber:#f59e0b;--ad:#3d2a00;
  --green:#22c55e;--gd:#14331f;
  --purple:#a78bfa;--pd:#2e1f4d;
}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;padding:.75rem 2rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:1rem;background:var(--bg2)}
.logo{font-size:20px;font-weight:700;text-decoration:none;color:var(--txt)}
main{width:100%;max-width:420px;padding:1rem 1rem;flex:1;display:flex;flex-direction:column;align-items:center}
.hero{text-align:center;margin-bottom:.5rem}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:.2rem}
.hero p{color:var(--txt2);font-size:13px}
.scores{display:flex;justify-content:center;gap:1.4rem;margin-bottom:.6rem;flex-wrap:wrap}
.score-item{text-align:center}
.score-item .sv{font-size:22px;font-weight:800}
.score-item .sl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.play-area{display:flex;gap:.7rem;align-items:flex-start;justify-content:center}
.canvas-wrap{position:relative}
canvas#tetrisCanvas{display:block;border-radius:10px;border:1px solid var(--bdr2);background:var(--bg3);touch-action:none}
.side-panel{display:flex;flex-direction:column;gap:.5rem;align-items:center}
.next-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
canvas#nextCanvas{border-radius:8px;border:1px solid var(--bdr2);background:var(--bg3)}
.overlay-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.7rem;background:rgba(11,15,26,.86);border-radius:10px;text-align:center;padding:1rem}
.overlay-msg.hidden{display:none}
.overlay-msg h3{font-size:19px;font-weight:800}
.overlay-msg p{font-size:12px;color:var(--txt2)}
.btn{cursor:pointer;border-radius:10px;font-size:14px;font-weight:700;padding:10px 20px;transition:all .15s;border:1px solid transparent;background:var(--purple);color:#1a1030}
.btn:hover{background:#bca4fc}
.btn:active{transform:scale(.97)}
.btn.bo{background:transparent;color:var(--txt);border-color:var(--bdr2)}
.btn.bo:hover{background:var(--bg3)}
.bfull{width:100%}
.tpad{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:50px 50px;gap:6px;margin-top:.7rem}
.tpad button{border-radius:10px;border:1px solid var(--bdr2);background:var(--surf);color:var(--txt);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none}
.tpad button:active{background:var(--bg3)}
.tpad .rot{grid-column:2;grid-row:1}
.tpad .left{grid-column:1;grid-row:2}
.tpad .down{grid-column:2;grid-row:2}
.tpad .right{grid-column:3;grid-row:2}
.harddrop-btn{margin-top:.4rem;width:100%;max-width:174px}
.hint{font-size:11px;color:var(--txt3);text-align:center;margin-top:.4rem}
/* Ayarlar */
.settings-btn{position:fixed;bottom:1rem;right:1rem;width:48px;height:48px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr2);color:var(--txt2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;transition:all .15s}
.settings-btn:hover{background:var(--bg3);color:var(--txt)}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.settings-overlay.open{display:flex}
.settings-panel{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:1.5rem;width:90%;max-width:360px;display:flex;flex-direction:column;gap:1rem}
.settings-panel h3{font-size:16px;font-weight:600}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--bdr)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;color:var(--txt2)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bdr2);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
.seg{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--bdr2)}
.seg button{flex:1;padding:5px 10px;border:none;background:transparent;color:var(--txt2);font-size:13px;cursor:pointer}
.seg button.active{background:var(--purple);color:#1a1030}
@media(max-width:380px){
  canvas#tetrisCanvas{width:170px;height:340px}
  .tpad{grid-template-columns:46px 46px 46px;grid-template-rows:42px 42px}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">&#129513; Blok D&uuml;&#351;&uuml;rme</a>
</header>

<main>
  <div class="hero">
    <h1 id="heroTitle">Blok D&uuml;&#351;&uuml;rme</h1>
    <p id="heroSubtitle">Sat&#305;rlar&#305; doldur, puan topla &mdash; klasik blok bulmacas&#305;!</p>
  </div>

  <div class="scores">
    <div class="score-item"><div class="sv" id="curScore">0</div><div class="sl" id="lblScore">Skor</div></div>
    <div class="score-item"><div class="sv" id="curLines">0</div><div class="sl" id="lblLines">Sat&#305;r</div></div>
    <div class="score-item"><div class="sv" id="curLevel">1</div><div class="sl" id="lblLevel">Seviye</div></div>
    <div class="score-item"><div class="sv" id="highScore">0</div><div class="sl" id="lblHighScore">En Y&uuml;ksek</div></div>
  </div>

  <div class="play-area">
    <div class="canvas-wrap">
      <canvas id="tetrisCanvas" width="200" height="400"></canvas>
      <div class="overlay-msg" id="overlayMsg">
        <h3 id="overlayTitle">Blok D&uuml;&#351;&uuml;rme</h3>
        <p id="overlaySub">Ba&#351;lamak i&#231;in butona bas</p>
        <button class="btn" id="startBtn" onclick="startGame()">Ba&#351;la</button>
      </div>
    </div>
    <div class="side-panel">
      <div class="next-label" id="nextLabel">S&#304;RADAK&#304;</div>
      <canvas id="nextCanvas" width="72" height="72"></canvas>
    </div>
  </div>

  <div class="tpad">
    <button class="rot" onclick="userRotate()">&#10227;</button>
    <button class="left" onclick="userMove(-1)">&#8592;</button>
    <button class="down" onclick="userSoftDrop()">&#8595;</button>
    <button class="right" onclick="userMove(1)">&#8594;</button>
  </div>
  <button class="btn bo harddrop-btn" onclick="userHardDrop()">&#11015; H&#305;zl&#305; D&uuml;&#351;&uuml;r</button>
  <p class="hint" id="hintTxt">Ok tu&#351;lar&#305;/WASD ile oyna, d&#246;nd&uuml;rmek i&#231;in yukar&#305; ok, h&#305;zl&#305; d&uuml;&#351;&uuml;rmek i&#231;in bo&#351;luk tu&#351;u</p>
</main>

<button class="settings-btn" onclick="openSettings()" title="Ayarlar">&#9881;</button>

<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <h3 id="settingsTitle">&#9881; Ayarlar</h3>
    <div class="setting-row">
      <span class="setting-label" id="lblSound">Ses</span>
      <button class="toggle" id="togSound" onclick="toggleSetting('sound')"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label" id="lblTheme">Tema</span>
      <div class="seg">
        <button id="themeDark" class="active" onclick="setTheme('dark')">Koyu</button>
        <button id="themeLight" onclick="setTheme('light')">Ayd&#305;nl&#305;k</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label" id="lblLang">Dil</span>
      <div class="seg">
        <button id="langTR" class="active" onclick="setLang('TR')">TR</button>
        <button id="langEN" onclick="setLang('EN')">EN</button>
      </div>
    </div>
    <button class="btn bo bfull" onclick="closeSettings()" id="btnCloseSettings">Kapat</button>
  </div>
</div>

<script>
var COLS=10, ROWS=20, CELL=20;
var SHAPES = {
  I: [[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],[[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]],
  O: [[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]],[[1,0],[2,0],[1,1],[2,1]]],
  T: [[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],
  S: [[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]],[[1,1],[2,1],[0,2],[1,2]],[[0,0],[0,1],[1,1],[1,2]]],
  Z: [[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[1,2],[2,2]],[[1,0],[0,1],[1,1],[0,2]]],
  J: [[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],
  L: [[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]]
};
var PIECE_COLORS = { I:'#22d3d3', O:'#facc15', T:'#a78bfa', S:'#22c55e', Z:'#ef4444', J:'#60a5fa', L:'#f97316' };
var PIECE_TYPES = Object.keys(SHAPES);

var canvas, ctx, nextCanvas, nextCtx;
var grid, current, nextType, score, lines, level, dropInterval, isPlaying, gameLoopHandle;
var highScore = parseInt(localStorage.getItem('tetrisHigh')||'0');
var soundOn = (localStorage.getItem('tetrisSound')!=='0');
var uiSettings = { theme: localStorage.getItem('tetrisTheme')||'dark', lang: localStorage.getItem('tetrisLang')||'TR' };

var LANG = {
  TR: {
    heroTitle:'Blok D&uuml;&#351;&uuml;rme', heroSubtitle:'Sat&#305;rlar&#305; doldur, puan topla &mdash; klasik blok bulmacas&#305;!',
    lblScore:'Skor', lblLines:'Sat&#305;r', lblLevel:'Seviye', lblHighScore:'En Y&uuml;ksek', nextLabel:'S&#304;RADAK&#304;',
    overlayTitle:'Blok D&uuml;&#351;&uuml;rme', overlaySub:'Ba&#351;lamak i&#231;in butona bas',
    btnStart:'Ba&#351;la', btnRetry:'Tekrar Oyna', gameOverTitle:'Oyun Bitti!', gameOverSub:'Skor: {n}',
    hardDrop:'&#11015; H&#305;zl&#305; D&uuml;&#351;&uuml;r',
    hintTxt:'Ok tu&#351;lar&#305;/WASD ile oyna, d&#246;nd&uuml;rmek i&#231;in yukar&#305; ok, h&#305;zl&#305; d&uuml;&#351;&uuml;rmek i&#231;in bo&#351;luk tu&#351;u',
    settingsTitle:'&#9881; Ayarlar', lblSound:'Ses', lblTheme:'Tema', themeDark:'Koyu', themeLight:'Ayd&#305;nl&#305;k', lblLang:'Dil', btnCloseSettings:'Kapat'
  },
  EN: {
    heroTitle:'Block Drop', heroSubtitle:'Fill the rows, score points \u2014 the classic block puzzle!',
    lblScore:'Score', lblLines:'Lines', lblLevel:'Level', lblHighScore:'Best', nextLabel:'NEXT',
    overlayTitle:'Block Drop', overlaySub:'Press the button to start',
    btnStart:'Start', btnRetry:'Play Again', gameOverTitle:'Game Over!', gameOverSub:'Score: {n}',
    hardDrop:'\u2b07 Hard Drop',
    hintTxt:'Play with arrow keys/WASD, up to rotate, space to hard drop',
    settingsTitle:'&#9881; Settings', lblSound:'Sound', lblTheme:'Theme', themeDark:'Dark', themeLight:'Light', lblLang:'Language', btnCloseSettings:'Close'
  }
};

function safeText(id,txt){ var e=document.getElementById(id); if(e) e.innerHTML=txt; }
function tr(key){ return (LANG[uiSettings.lang]&&LANG[uiSettings.lang][key])!=null ? LANG[uiSettings.lang][key] : key; }

function applyLang(){
  var L = LANG[uiSettings.lang];
  safeText('heroTitle', L.heroTitle); safeText('heroSubtitle', L.heroSubtitle);
  safeText('lblScore', L.lblScore); safeText('lblLines', L.lblLines); safeText('lblLevel', L.lblLevel); safeText('lblHighScore', L.lblHighScore);
  safeText('nextLabel', L.nextLabel); safeText('hintTxt', L.hintTxt); safeText('startBtn', L.btnStart);
  safeText('settingsTitle', L.settingsTitle); safeText('lblSound', L.lblSound);
  safeText('lblTheme', L.lblTheme); safeText('themeDark', L.themeDark); safeText('themeLight', L.themeLight);
  safeText('lblLang', L.lblLang); safeText('btnCloseSettings', L.btnCloseSettings);
  var hd=document.querySelector('.harddrop-btn'); if(hd) hd.innerHTML=L.hardDrop;
  if(!isPlaying){ safeText('overlayTitle', L.overlayTitle); safeText('overlaySub', L.overlaySub); }
}

function applyTheme(){
  if(uiSettings.theme==='light'){
    document.documentElement.style.setProperty('--bg','#f0f4f8');
    document.documentElement.style.setProperty('--bg2','#e2e8f0');
    document.documentElement.style.setProperty('--bg3','#cbd5e1');
    document.documentElement.style.setProperty('--surf','#ffffff');
    document.documentElement.style.setProperty('--bdr','#94a3b8');
    document.documentElement.style.setProperty('--bdr2','#64748b');
    document.documentElement.style.setProperty('--txt','#0f172a');
    document.documentElement.style.setProperty('--txt2','#334155');
    document.documentElement.style.setProperty('--txt3','#64748b');
  } else {
    document.documentElement.style.setProperty('--bg','#0b0f1a');
    document.documentElement.style.setProperty('--bg2','#111827');
    document.documentElement.style.setProperty('--bg3','#1c2536');
    document.documentElement.style.setProperty('--surf','#1e2d40');
    document.documentElement.style.setProperty('--bdr','#2a3f58');
    document.documentElement.style.setProperty('--bdr2','#3a5472');
    document.documentElement.style.setProperty('--txt','#e8f0fe');
    document.documentElement.style.setProperty('--txt2','#8aa5c2');
    document.documentElement.style.setProperty('--txt3','#556a82');
  }
  render();
}
function setTheme(t){
  uiSettings.theme=t; localStorage.setItem('tetrisTheme', t);
  document.getElementById('themeDark').classList.toggle('active', t==='dark');
  document.getElementById('themeLight').classList.toggle('active', t==='light');
  applyTheme();
}
function setLang(l){
  uiSettings.lang=l; localStorage.setItem('tetrisLang', l);
  document.getElementById('langTR').classList.toggle('active', l==='TR');
  document.getElementById('langEN').classList.toggle('active', l==='EN');
  applyLang();
}
function openSettings(){
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('togSound').classList.toggle('on', soundOn);
}
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('open'); }
function closeSettingsOutside(e){ if(e.target.id==='settingsOverlay') closeSettings(); }
function toggleSetting(key){
  if(key==='sound'){
    soundOn = !soundOn;
    localStorage.setItem('tetrisSound', soundOn?'1':'0');
    document.getElementById('togSound').classList.toggle('on', soundOn);
    if(soundOn) playTone(440,0.15);
  }
}

// ── SES ───────────────────────────────────────────────────
var AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function playTone(freq,dur,type){
  if(!soundOn) return;
  var ac=getAC(); if(!ac) return;
  try{
    var o=ac.createOscillator(), gn=ac.createGain();
    o.connect(gn); gn.connect(ac.destination);
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,ac.currentTime);
    gn.gain.setValueAtTime(0.28,ac.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||0.2));
    o.start(); o.stop(ac.currentTime+(dur||0.2));
  }catch(e){}
}
function sndMove(){ playTone(220,0.05); }
function sndRotate(){ playTone(340,0.06); }
function sndLock(){ playTone(180,0.08); }
function sndClear(n){
  var base=[440,550,660,880][Math.min(n-1,3)];
  [base,base*1.25].forEach(function(f,i){ setTimeout(function(){playTone(f,0.14);},i*70); });
}
function sndGameOver(){ [300,250,200,150].forEach(function(f,i){ setTimeout(function(){playTone(f,0.3,'sawtooth');},i*130); }); }

// ── PARCA / CARPISMA ──────────────────────────────────────
function randomType(){ return PIECE_TYPES[Math.floor(Math.random()*PIECE_TYPES.length)]; }
function pieceCells(p){
  return SHAPES[p.type][p.rot].map(function(c){ return {x:p.x+c[0], y:p.y+c[1]}; });
}
function validPosition(p){
  var cells=pieceCells(p);
  for(var i=0;i<cells.length;i++){
    var c=cells[i];
    if(c.x<0||c.x>=COLS||c.y>=ROWS) return false;
    if(c.y>=0 && grid[c.y][c.x]) return false;
  }
  return true;
}
function spawnPiece(){
  current = { type: nextType||randomType(), rot:0, x:3, y:0 };
  nextType = randomType();
  drawNext();
}

function tryMove(dx,dy){
  var cand={ type:current.type, rot:current.rot, x:current.x+dx, y:current.y+dy };
  if(validPosition(cand)){ current=cand; return true; }
  return false;
}
function tryRotate(){
  var cand={ type:current.type, rot:(current.rot+1)%4, x:current.x, y:current.y };
  if(validPosition(cand)){ current=cand; return true; }
  // basit duvar itme: 1 sola, 1 saga dene
  cand.x=current.x-1; if(validPosition(cand)){ current=cand; return true; }
  cand.x=current.x+1; if(validPosition(cand)){ current=cand; return true; }
  return false;
}

function lockPiece(){
  var cells=pieceCells(current);
  cells.forEach(function(c){ if(c.y>=0 && c.y<ROWS) grid[c.y][c.x]=PIECE_COLORS[current.type]; });
  sndLock();
  checkAndClearLines();
}

function checkAndClearLines(){
  var fullRows=[];
  for(var y=0;y<ROWS;y++){ if(grid[y].every(function(v){ return v; })) fullRows.push(y); }
  if(fullRows.length===0){ afterLock(); return; }
  render(fullRows);
  sndClear(fullRows.length);
  setTimeout(function(){
    grid = grid.filter(function(row,idx){ return fullRows.indexOf(idx)===-1; });
    for(var i=0;i<fullRows.length;i++){ grid.unshift(new Array(COLS).fill(0)); }
    lines += fullRows.length;
    var pts=[0,100,300,500,800][fullRows.length]||800;
    score += pts*level;
    var newLevel = Math.floor(lines/10)+1;
    if(newLevel!==level){
      level=newLevel;
      dropInterval=Math.max(120, 800-(level-1)*65);
      restartLoop();
    }
    updateScoreDisplay();
    afterLock();
    render();
  }, 170);
}

function afterLock(){
  spawnPiece();
  if(!validPosition(current)) endGame();
}

function updateScoreDisplay(){
  document.getElementById('curScore').textContent=score;
  document.getElementById('curLines').textContent=lines;
  document.getElementById('curLevel').textContent=level;
}

// ── KULLANICI GIRISI ──────────────────────────────────────
function userMove(dx){ if(!isPlaying) return; if(tryMove(dx,0)){ sndMove(); render(); } }
function userRotate(){ if(!isPlaying) return; if(tryRotate()){ sndRotate(); render(); } }
function userSoftDrop(){ if(!isPlaying) return; if(!tryMove(0,1)){ lockPiece(); } render(); }
function userHardDrop(){
  if(!isPlaying) return;
  while(tryMove(0,1)){}
  lockPiece();
  render();
}

document.addEventListener('keydown', function(e){
  if(!isPlaying) return;
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ e.preventDefault(); userMove(-1); }
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){ e.preventDefault(); userMove(1); }
  else if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){ e.preventDefault(); userRotate(); }
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){ e.preventDefault(); userSoftDrop(); }
  else if(e.key===' '){ e.preventDefault(); userHardDrop(); }
});
document.querySelectorAll('.tpad button').forEach(function(btn){
  btn.addEventListener('touchstart', function(e){ e.preventDefault(); btn.click(); }, {passive:false});
});

// ── OYUN DONGUSU ──────────────────────────────────────────
function gravityTick(){
  if(!tryMove(0,1)) lockPiece();
  render();
}
function restartLoop(){
  clearInterval(gameLoopHandle);
  gameLoopHandle=setInterval(gravityTick, dropInterval);
}

function startGame(){
  grid=[];
  for(var y=0;y<ROWS;y++) grid.push(new Array(COLS).fill(0));
  score=0; lines=0; level=1; dropInterval=800; isPlaying=true;
  nextType=randomType();
  spawnPiece();
  updateScoreDisplay();
  document.getElementById('overlayMsg').classList.add('hidden');
  restartLoop();
  render();
}

function endGame(){
  isPlaying=false;
  clearInterval(gameLoopHandle);
  sndGameOver();
  if(score>highScore){ highScore=score; localStorage.setItem('tetrisHigh', highScore); }
  document.getElementById('highScore').textContent=highScore;
  safeText('overlayTitle', tr('gameOverTitle'));
  safeText('overlaySub', tr('gameOverSub').replace('{n}', score));
  safeText('startBtn', tr('btnRetry'));
  document.getElementById('startBtn').onclick=function(){ startGame(); };
  document.getElementById('overlayMsg').classList.remove('hidden');
}

// ── CIZIM ─────────────────────────────────────────────────
function cssVar(name, fallback){
  if(typeof getComputedStyle==='function'){
    var v=getComputedStyle(document.documentElement).getPropertyValue(name);
    if(v) return v.trim();
  }
  return fallback;
}
function render(highlightRows){
  if(!ctx) return;
  ctx.fillStyle=cssVar('--bg3','#1c2536');
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(var y=0;y<ROWS;y++){
    for(var x=0;x<COLS;x++){
      if(grid[y][x]){
        ctx.fillStyle = (highlightRows && highlightRows.indexOf(y)!==-1) ? '#ffffff' : grid[y][x];
        ctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
      }
    }
  }
  if(isPlaying && current){
    ctx.fillStyle=PIECE_COLORS[current.type];
    pieceCells(current).forEach(function(c){
      if(c.y>=0) ctx.fillRect(c.x*CELL+1, c.y*CELL+1, CELL-2, CELL-2);
    });
  }
}
function drawNext(){
  if(!nextCtx) return;
  nextCtx.fillStyle=cssVar('--bg3','#1c2536');
  nextCtx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
  var cells=SHAPES[nextType][0];
  var ncell=16;
  var minX=Math.min.apply(null,cells.map(function(c){return c[0];}));
  var maxX=Math.max.apply(null,cells.map(function(c){return c[0];}));
  var minY=Math.min.apply(null,cells.map(function(c){return c[1];}));
  var offX=(4-(maxX-minX+1))/2 - minX;
  var offY=(2-(Math.max.apply(null,cells.map(function(c){return c[1];}))-minY+1))/2 - minY +1;
  nextCtx.fillStyle=PIECE_COLORS[nextType];
  cells.forEach(function(c){
    nextCtx.fillRect((c[0]+offX)*ncell+1, (c[1]+offY)*ncell+1, ncell-2, ncell-2);
  });
}

canvas=document.getElementById('tetrisCanvas');
canvas.width=COLS*CELL; canvas.height=ROWS*CELL;
ctx=canvas.getContext('2d');
nextCanvas=document.getElementById('nextCanvas');
nextCtx=nextCanvas.getContext('2d');

grid=[];
for(var yi=0;yi<ROWS;yi++) grid.push(new Array(COLS).fill(0));
current=null; nextType=randomType(); score=0; lines=0; level=1; isPlaying=false;
document.getElementById('highScore').textContent=highScore;
render(); drawNext();

applyTheme();
document.getElementById('themeDark').classList.toggle('active', uiSettings.theme==='dark');
document.getElementById('themeLight').classList.toggle('active', uiSettings.theme==='light');
document.getElementById('langTR').classList.toggle('active', uiSettings.lang==='TR');
document.getElementById('langEN').classList.toggle('active', uiSettings.lang==='EN');
applyLang();
</script>
